# =============================================================================
# monitoring/grafana/provisioning/dashboards/dashboard.yml
#
# Auto-loads dashboard JSON files into Grafana on startup.
# Grafana watches the path below and imports/updates any *.json dashboard
# definitions it finds — no manual "Import dashboard" step needed.
# =============================================================================

apiVersion: 1

providers:
  - name: ML Pipeline Dashboards
    orgId: 1
    folder: "MLOps Observability"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false