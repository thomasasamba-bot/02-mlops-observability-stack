# =============================================================================
# .github/workflows/security-scan.yml
#
# Security scanning — runs weekly and on push to main.
#
# Jobs:
#   dependency-audit  → pip-audit for known CVEs in Python deps
#   image-scan        → Trivy container image vulnerability scan
#
# Fixes applied:
#   - Corrected pip-audit command syntax (was: invalid combination of
#     -r/--requirement with positional project_path argument)
#   - audit-results.json now always exists before upload-artifact runs
#   - Trivy action pinned to a stable version instead of @master
# =============================================================================

name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - "infra/docker/**"
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Python dependency audit ─────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt --quiet

      - name: Audit dependencies (JSON report)
        run: |
          pip-audit -r requirements.txt -f json -o audit-results.json || true
          # Ensure the file exists even if pip-audit produced no output
          [ -f audit-results.json ] || echo "[]" > audit-results.json

      - name: Audit dependencies (human-readable, non-blocking)
        run: pip-audit -r requirements.txt || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit
          path: audit-results.json

  # ── Container image scan ────────────────────────────────────────────────────
  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build \
            -f infra/docker/base-images/python-ml-base.Dockerfile \
            -t observability-ml:scan-target .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: observability-ml:scan-target
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # report only, don't fail the build

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif