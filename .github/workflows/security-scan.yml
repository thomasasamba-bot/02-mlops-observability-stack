# =============================================================================
# .github/workflows/security-scan.yml
#
# Security scanning — runs weekly and on push to main.
#
# Jobs:
#   dependency-audit  → pip-audit for known CVEs in Python deps
#   image-scan        → Trivy container image vulnerability scan
# =============================================================================

name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - "infra/docker/**"
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/observability-ml

jobs:
  # ── Python dependency audit ─────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip-audit --requirement requirements.txt \
            --output json --output-file audit-results.json || true
          pip-audit --requirement requirements.txt

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit
          path: audit-results.json

  # ── Container image scan ────────────────────────────────────────────────────
  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build \
            -f infra/docker/base-images/python-ml-base.Dockerfile \
            -t observability-ml:scan-target .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: observability-ml:scan-target
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # don't fail build on findings; report only

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif