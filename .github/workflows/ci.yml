# =============================================================================
# .github/workflows/ci.yml
#
# CI pipeline — runs on every push and pull request.
#
# Jobs:
#   lint        → ruff (style + imports)
#   unit-tests  → 86 offline tests (no services needed)
#   drift-check → PSI/KS-test report against credit_drifted.csv
#                 exits 1 if drift NOT detected (detector broken)
#                 exits 1 if drift IS detected on baseline (false positive)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  MLFLOW_TRACKING_URI: "sqlite:///mlflow-ci.db"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check app/ scripts/ tests/ --output-format=github

  # ── Unit tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      MLFLOW_TRACKING_URI: "sqlite:///mlflow-ci.db"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate datasets
        run: python scripts/data/generate_data.py

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results/unit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/

  # ── Drift gate ──────────────────────────────────────────────────────────────
  drift-check:
    name: Drift Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      MLFLOW_TRACKING_URI: "sqlite:///mlflow-ci.db"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate datasets
        run: python scripts/data/generate_data.py

      - name: Train model (SQLite backend — no server needed)
        run: python -m app.pipeline.train --no-register

      - name: Drift check — drifted CSV (MUST fire)
        id: drift-drifted
        run: |
          python -m app.pipeline.drift_detector \
            --current-csv data/raw/credit_drifted.csv
        continue-on-error: true

      - name: Assert drift was detected in drifted CSV
        if: steps.drift-drifted.outcome == 'success'
        run: |
          echo "ERROR: drift_detector did not fire on credit_drifted.csv"
          echo "The drift detector may be broken — check PSI thresholds."
          exit 1

      - name: Drift check — baseline CSV (must NOT fire)
        id: drift-baseline
        run: |
          python -m app.pipeline.drift_detector \
            --current-csv data/raw/credit_baseline.csv
        continue-on-error: true

      - name: Assert no false positive on baseline CSV
        if: steps.drift-baseline.outcome == 'failure'
        run: |
          echo "ERROR: drift_detector fired on credit_baseline.csv — false positive"
          echo "Check PSI thresholds or training data generation."
          exit 1

      - name: Drift gate passed
        run: echo "✓ Drift detector fires on drifted data and is quiet on stable data"