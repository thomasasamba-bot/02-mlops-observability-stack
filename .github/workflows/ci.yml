# =============================================================================
# .github/workflows/ci.yml
#
# CI pipeline — runs on every push and pull request.
#
# Jobs:
#   lint        → ruff (style + imports)
#   unit-tests  → 86 offline tests (no services needed)
#   drift-check → batch PSI/KS-test report against credit_drifted.csv
#                 exits 1 if drift detected (gates deployment)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  MLFLOW_TRACKING_URI: "sqlite:///mlflow-ci.db"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        run: ruff check app/ scripts/ tests/ --output-format=github

  # ── Unit tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate datasets
        run: python scripts/data/generate_data.py

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results/unit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/

  # ── Drift gate ──────────────────────────────────────────────────────────────
  drift-check:
    name: Drift Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate datasets + train model
        run: |
          python scripts/data/generate_data.py
          python -m app.pipeline.train --no-register

      - name: Run drift check against drifted dataset
        id: drift
        run: |
          python -m app.pipeline.drift_detector \
            --current-csv data/raw/credit_drifted.csv
        # exits 1 if drift detected — which is EXPECTED for the drifted CSV
        continue-on-error: true

      - name: Run drift check against baseline (must be clean)
        run: |
          python -m app.pipeline.drift_detector \
            --current-csv data/raw/credit_baseline.csv
        # exits 1 if drift detected on BASELINE — that would be a bug

      - name: Assert drifted CSV triggers drift
        if: steps.drift.outcome == 'success'
        run: |
          echo "ERROR: Drift check did not fire on credit_drifted.csv"
          echo "The drift detector may be broken."
          exit 1

      - name: Drift gate passed
        if: steps.drift.outcome == 'failure'
        run: echo "Drift correctly detected in drifted dataset ✓"