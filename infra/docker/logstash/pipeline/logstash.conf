input {
  # Beats (Filebeat)
  beats {
    port => 5044
    type => "beats"
  }

  # Syslog
  tcp {
    port => 5000
    type => "syslog"
    codec => "line"
  }

  # Direct JSON (applications can POST here)
  http {
    port => 8080
    type => "application"
    codec => "json"
  }
}

filter {

  # ─── DOCKER CONTAINER LOGS ────────────────────────────────────────
  if [type] == "beats" {
    json {
      source  => "message"
      target  => "parsed"
      skip_on_invalid_json => true
    }

    mutate {
      add_field => {
        "[@metadata][index]" => "docker-logs-%{+YYYY.MM.dd}"
      }
    }
  }

  # ─── SYSLOG PARSING ───────────────────────────────────────────────
  if [type] == "syslog" {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
      }
      add_tag => ["syslog_parsed"]
    }

    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
    }

    mutate {
      add_field => { "[@metadata][index]" => "syslog-%{+YYYY.MM.dd}" }
    }
  }

  # ─── APPLICATION LOG ENRICHMENT ───────────────────────────────────
  if [type] == "application" {
    mutate {
      add_field => { "[@metadata][index]" => "app-logs-%{+YYYY.MM.dd}" }
    }
  }

  # ─── SEVERITY MAPPING ─────────────────────────────────────────────
  if [level] {
    translate {
      field       => "level"
      destination => "severity_num"
      dictionary  => {
        "DEBUG"    => "1"
        "INFO"     => "2"
        "WARNING"  => "3"
        "ERROR"    => "4"
        "CRITICAL" => "5"
      }
      fallback => "2"
    }
  }

  # ─── GEO-IP ENRICHMENT (if IP present) ───────────────────────────
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # ─── DROP HEALTHCHECK NOISE ───────────────────────────────────────
  if [message] =~ /health(check)?|ping|favicon/ {
    drop {}
  }

  # ─── TIMESTAMP ────────────────────────────────────────────────────
  mutate {
    add_field => { "ingested_at" => "%{@timestamp}" }
  }
}

output {
  # Route to Elasticsearch
  elasticsearch {
    hosts    => ["elasticsearch:9200"]
    index    => "%{[@metadata][index]}"
    action   => "index"
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
