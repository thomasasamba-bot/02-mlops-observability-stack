apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: mlops
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: [alertname, team]
      group_wait:      30s
      group_interval:  5m
      repeat_interval: 4h
      receiver: default-receiver

      routes:
        - match:
            severity: critical
          receiver: critical-receiver
          group_wait: 10s
          repeat_interval: 1h

        - match:
            team: mlops
          receiver: mlops-receiver

    receivers:
      - name: default-receiver
        webhook_configs:
          - url: http://alertmanager-webhook:5001/alert
            send_resolved: true

      - name: critical-receiver
        webhook_configs:
          - url: http://alertmanager-webhook:5001/alert
            send_resolved: true

      - name: mlops-receiver
        webhook_configs:
          - url: http://alertmanager-webhook:5001/alert
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: mlops
  labels:
    app: alertmanager
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        component: monitoring
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.listen-address=:9093
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: mlops
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
      name: http
  type: ClusterIP

---
