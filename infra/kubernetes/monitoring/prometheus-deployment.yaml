apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    rule_files:
      - /etc/prometheus/alert_rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: inference-server
        static_configs:
          - targets: ["inference-server:8006"]
        metrics_path: /metrics

      - job_name: metrics-exporter
        static_configs:
          - targets: ["metrics-exporter:8007"]
        metrics_path: /metrics

      # Auto-discover pods with prometheus.io/scrape=true annotation
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [mlops]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

  alert_rules.yml: |
    groups:
      - name: ml_drift
        interval: 30s
        rules:
          - alert: ModelDriftDetected
            expr: ml_drift_detected == 1
            for: 2m
            labels:
              severity: warning
              team: mlops
            annotations:
              summary: "Model drift detected"
              description: "{{ $value }} features have exceeded PSI alert threshold."

          - alert: PredictionConfidenceLow
            expr: ml_prediction_confidence_mean < 0.35
            for: 5m
            labels:
              severity: warning
              team: mlops
            annotations:
              summary: "Prediction confidence degraded"
              description: "Mean prediction confidence is {{ $value | humanizePercentage }}."

          - alert: ModelAccuracyDegraded
            expr: mlflow_run_metric{metric="test_roc_auc"} < 0.75
            for: 0m
            labels:
              severity: critical
              team: mlops
            annotations:
              summary: "Model ROC-AUC below threshold"
              description: "Latest model ROC-AUC is {{ $value }}. Retrain required."

          - alert: HighDefaultRate
            expr: ml_prediction_default_rate > 0.50
            for: 10m
            labels:
              severity: warning
              team: mlops
            annotations:
              summary: "Abnormally high default rate in predictions"
              description: "Rolling default rate is {{ $value | humanizePercentage }}."

          - alert: InferenceServerDown
            expr: ml_inference_server_up == 0
            for: 1m
            labels:
              severity: critical
              team: mlops
            annotations:
              summary: "Inference server is unreachable"
              description: "The ML inference server health check has been failing for 1 minute."

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: mlops
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: mlops

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-mlops
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-mlops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-mlops
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: mlops

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  type: ClusterIP

---
